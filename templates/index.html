<!DOCTYPE html>
<html>
<head>
    <title>Emotion Detector</title>
</head>
<body>

<h2>Emotion Detector</h2>

<input type="text" id="text" placeholder="Enter text here">
<button onclick="analyze()">Analyze</button>

<p id="result"></p>

<script>
function analyze() {
    let text = document.getElementById("text").value;

    fetch(`/emotionDetector?textToAnalyze=${text}`)
    .then(response => response.json())
    .then(data => {
        document.getElementById("result").innerHTML =
        `Dominant Emotion: ${data.dominant_emotion}`;
    })
    .catch(() => {
        document.getElementById("result").innerHTML = "Error occurred!";
    });
}
</script>

</body>
</html>
